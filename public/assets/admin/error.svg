  <rect width="1920" height="1080" fill="#0a0a0a"></rect>
  <circle cx="960" cy="540" r="400" fill="url(#grad)"></circle>
  <rect width="1920" height="1080" filter="url(#noise)" opacity="0.05"></rect>
